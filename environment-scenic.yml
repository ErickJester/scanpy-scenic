# =============================================================================
# Entorno conda para el TUTORIAL DE SCENIC (02_scenic_pipeline.py)
# Fuente: https://github.com/aertslab/SCENICprotocol
#
# El protocolo SCENIC (2021) fue escrito para un ecosistema anterior. Para que
# GRNBoost2 REAL (arboreto + dask) y pyscenic funcionen "tal cual el tutorial"
# hay que fijar versiones antiguas: numpy <1.24 (antes de eliminar np.object),
# pandas <2.0 (antes del cambio de MultiIndex), y un dask compatible con la
# API legacy que usa arboreto.
#
# Estas son las versiones del release oficial pySCENIC 0.12.1 (la imagen Docker
# aertslab/pyscenic:0.12.1 usa este mismo conjunto).
#
# Crear el entorno:
#   conda env create -f environment-scenic.yml
#   conda activate scenic-tutorial
#   python 02_scenic_pipeline.py
# =============================================================================
name: scenic-tutorial

channels:
  - conda-forge
  - bioconda

dependencies:
  - python=3.10
  - pip
  - numpy=1.23.5
  - pandas=1.5.3
  - scipy=1.10.1
  - dask=2023.3.2
  - distributed=2023.3.2
  - cytoolz
  - igraph
  - leidenalg
  - pip:
      - scanpy==1.9.3
      - anndata==0.8.0
      - pyscenic==0.12.1
      - arboreto==0.1.6
      - ctxcore==0.2.0
      - loompy==3.0.7
      - pooch
